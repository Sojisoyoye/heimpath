name: Test Backend

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Create .env file
        env:
          DOMAIN: ${{ secrets.DOMAIN }}
          STACK_NAME: ${{ secrets.STACK_NAME }}
          FRONTEND_HOST: ${{ secrets.FRONTEND_HOST }}
          ENVIRONMENT: ${{ secrets.ENVIRONMENT }}
          BACKEND_CORS_ORIGINS: ${{ secrets.BACKEND_CORS_ORIGINS }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          FIRST_SUPERUSER: ${{ secrets.FIRST_SUPERUSER }}
          FIRST_SUPERUSER_PASSWORD: ${{ secrets.FIRST_SUPERUSER_PASSWORD }}
          PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
          POSTGRES_SERVER: ${{ secrets.POSTGRES_SERVER }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          DOCKER_IMAGE_BACKEND: ${{ secrets.DOCKER_IMAGE_BACKEND }}
          DOCKER_IMAGE_FRONTEND: ${{ secrets.DOCKER_IMAGE_FRONTEND }}
        run: |
          env | grep -E '^(DOMAIN|STACK_NAME|FRONTEND_HOST|ENVIRONMENT|BACKEND_CORS_ORIGINS|SECRET_KEY|FIRST_SUPERUSER|FIRST_SUPERUSER_PASSWORD|PROJECT_NAME|POSTGRES_SERVER|POSTGRES_PORT|POSTGRES_DB|POSTGRES_USER|POSTGRES_PASSWORD|DOCKER_IMAGE_BACKEND|DOCKER_IMAGE_FRONTEND)=' > .env
          echo "SMTP_HOST=" >> .env
          echo "SMTP_USER=" >> .env
          echo "SMTP_PASSWORD=" >> .env
          echo "EMAILS_FROM_EMAIL=info@example.com" >> .env
          echo "SENTRY_DSN=" >> .env
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - run: docker compose down -v --remove-orphans
      - run: docker compose up -d db mailcatcher
      - name: Migrate DB
        run: uv run bash scripts/prestart.sh
        working-directory: backend
      - name: Run tests
        run: uv run bash scripts/tests-start.sh "Coverage for ${{ github.sha }}"
        working-directory: backend
      - run: docker compose down -v --remove-orphans
      - name: Store coverage files
        uses: actions/upload-artifact@v6
        with:
          name: coverage-html
          path: backend/htmlcov
          include-hidden-files: true
      - name: Coverage report
        run: uv run coverage report --fail-under=70
        working-directory: backend
      - name: Generate coverage XML
        run: uv run coverage xml
        working-directory: backend
      - name: Fix coverage XML paths for SonarCloud
        # SonarCloud runs in Docker at /github/workspace/ but coverage.py
        # records absolute paths from the runner (/home/runner/work/...).
        # Replace the source path so SonarCloud can resolve file coverage.
        run: |
          python3 - <<'EOF'
          import re, pathlib
          path = pathlib.Path("backend/coverage.xml")
          content = path.read_text()
          # Replace any absolute <source> element with the container path
          content = re.sub(
              r"<source>[^<]*/backend(?:/app)?</source>",
              "<source>/github/workspace/backend</source>",
              content,
          )
          path.write_text(content)
          print("Fixed coverage XML source paths for SonarCloud")
          EOF
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: true
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
